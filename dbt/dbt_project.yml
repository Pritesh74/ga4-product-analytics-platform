name: 'ga4_analytics'
version: '1.0.0'
config-version: 2

profile: 'ga4_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  ga4_analytics:
    staging:
      +schema: ga4_staging
      +materialized: view

    intermediate:
      +schema: ga4_intermediate
      +materialized: view

    marts:
      +schema: ga4_marts
      +materialized: table

    experiments:
      +schema: ga4_experiments
      +materialized: table

vars:
  # Source project — always the public GA4 dataset
  ga4_source_project: 'bigquery-public-data'
  ga4_source_dataset: 'ga4_obfuscated_sample_ecommerce'

  # Date range to process (override in production runs)
  start_date: '2020-11-01'
  end_date:   '2021-01-31'
